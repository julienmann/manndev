<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
<title>Client Portal — Mann Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <p class="login-kicker">Mann Dev — Client Portal</p>
      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">Enter the email address we used for your project. We'll send you a secure link, no password needed.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label class="field-label" for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@yourbusiness.com" autocomplete="email" required>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">
          <span id="submit-label">Send secure link</span>
        </button>
        <p class="login-status" id="status" role="status" aria-live="polite"></p>
      </form>

      <div class="login-foot">
        Not a client yet? <a href="https://dev.julienmann.ca/#contact">Get in touch</a> about your project.
      </div>
    </div>
  </div>
  <script type="module" src="/src/login.ts"></script>
</body>
</html>
