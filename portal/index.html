<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/portal/favicon.svg" />
<title>Client Portal — Mann Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/portal/assets/main-D5idWW8l.js"></script>
  <link rel="modulepreload" crossorigin href="/portal/assets/supabase-Drdwl8tv.js">
  <link rel="stylesheet" crossorigin href="/portal/assets/supabase-DF7cmbjJ.css">
</head>
<body>
  <div class="portal-bar">
    <a href="https://dev.julienmann.ca/" class="portal-wordmark">MANN DEV</a>
    <span class="login-dateline">Client Access</span>
  </div>

  <main class="login-main">
    <div class="login-content">
      <h1 class="login-title">Sign in</h1>
      <p class="login-aside">no password, just the email already on file for your project</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label class="field-label" for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@yourbusiness.com" autocomplete="email" required>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">
          <span id="submit-label">Send secure link</span>
        </button>
        <p class="login-status" id="status" role="status" aria-live="polite"></p>
      </form>

      <p class="login-foot">Not a client yet? <a href="https://dev.julienmann.ca/#contact">Get in touch</a> about your project, I read these myself.</p>
    </div>
  </main>

</body>
</html>
