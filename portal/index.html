<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/portal/favicon.svg" />
<title>Client Portal — Mann Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/portal/assets/main-D5idWW8l.js"></script>
  <link rel="modulepreload" crossorigin href="/portal/assets/supabase-Drdwl8tv.js">
  <link rel="stylesheet" crossorigin href="/portal/assets/supabase-DF7cmbjJ.css?v=2">
</head>
<body>
  <div class="portal-bar">
    <a href="https://dev.julienmann.ca/" class="portal-wordmark">
      <span class="wm-name">Mann Dev</span>
      <span class="wm-sub">Montréal</span>
    </a>
    <span class="login-dateline">Client Access</span>
  </div>

  <main class="login-main">
    <div class="login-content">
      <p class="login-kicker">Client Portal</p>
      <h1 class="login-title">Sign in</h1>
      <p class="login-aside">No password needed — just the email already on file for your project.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <input type="email" id="email" name="email" class="field-input" placeholder="x" autocomplete="email" required>
          <label class="field-label" for="email">Email address</label>
        </div>
        <div class="submit-row">
          <button type="submit" class="btn-primary" id="submit-btn">
            <span id="submit-label">Send secure link</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            <div class="cta-underline-wrap"><div class="cta-underline"></div></div>
          </button>
        </div>
        <p class="login-status" id="status" role="status" aria-live="polite"></p>
      </form>

      <p class="login-foot">Not a client yet? <a href="https://dev.julienmann.ca/#contact">Get in touch</a> about your project — I read these myself.</p>
    </div>
  </main>

</body>
</html>
